[build-system]
requires = ["setuptools>=68"]
build-backend = "setuptools.build_meta"

[project]
name = "runcost"
version = "0.0.0"
description = "Prototype cost calculator for LLM and agent API responses."
requires-python = ">=3.9"
readme = "README.md"

[tool.setuptools.packages.find]
where = ["packages/python"]
