name: Feature request
description: Request a provider, framework, price source, or API improvement.
title: "[Feature]: "
labels: ["enhancement"]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What are you trying to price or explain?
    validations:
      required: true
  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - Provider extractor
        - Framework adapter
        - Price source adapter
        - Custom pricing or discounts
        - Warning or strict-mode behavior
        - Package or documentation
        - Other
    validations:
      required: true
  - type: textarea
    id: examples
    attributes:
      label: Example shape or docs
      description: Link to official docs or paste sanitized object shapes if available.
    validations:
      required: false
  - type: textarea
    id: acceptance
    attributes:
      label: Desired outcome
      description: What would make this complete for your use case?
    validations:
      required: true
