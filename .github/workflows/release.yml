name: release

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Semantic version to verify, for example 0.1.0"
        required: true
        type: string
      publish:
        description: "Publish to PyPI and npm after verification"
        required: true
        default: false
        type: boolean
      publish_approval:
        description: "Required when publish=true. Enter publish-runcost to confirm explicit publication approval."
        required: false
        default: ""
        type: string

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Validate publish approval
        if: ${{ inputs.publish && inputs.publish_approval != 'publish-runcost' }}
        run: |
          echo "publish=true requires publish_approval=publish-runcost after explicit artifact review and registry setup." >&2
          exit 1

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: false

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Verify release readiness
        env:
          EXPECTED_VERSION: ${{ inputs.version }}
        run: |
          npm test
          npm run check:coverage
          npm run check:packages
          npm run check:release
          npm run check:release-dry-run
          npm run example:js
          npm run example:py
          npm run example:framework:js
          npm run example:framework:py

      - name: Build Python package
        run: |
          python3 -m pip install --upgrade build
          python3 -m build

      - name: Pack npm package
        run: |
          mkdir -p dist/npm
          npm pack ./packages/javascript/core --pack-destination dist/npm

      - name: Verify Go module from published tag
        env:
          GITHUB_TOKEN: ${{ github.token }}
          GOPRIVATE: github.com/adamallcock/runcost
        run: |
          set -euo pipefail
          if git ls-remote --exit-code --tags origin "refs/tags/v${{ inputs.version }}" >/dev/null 2>&1; then
            git config --global url."https://x-access-token:${GITHUB_TOKEN}@github.com/".insteadOf "https://github.com/"
            tmpdir="$(mktemp -d)"
            cd "$tmpdir"
            go mod init runcost-release-tag-check
            go list -m -versions github.com/adamallcock/runcost
            go get github.com/adamallcock/runcost/packages/go/ledger@v${{ inputs.version }}
            cat > ledger_test.go <<'EOF'
          package releasecheck

          import (
              "encoding/json"
              "testing"

              ledger "github.com/adamallcock/runcost/packages/go/ledger"
          )

          func TestPublishedTagImportPath(t *testing.T) {
              result := ledger.CalculateCost(
                  ledger.Object{
                      "schema_version": "0.1",
                      "provider": "release-check",
                      "surface": "release-check",
                      "model": ledger.Object{"requested": "model", "billed": "model", "alias_resolution": "none"},
                      "components": []any{ledger.Object{"name": "input_uncached_tokens", "quantity": "1000", "unit": "token"}},
                  },
                  []any{ledger.Object{
                      "schema_version": "0.1",
                      "id": "release-check:model",
                      "provider": "release-check",
                      "surface": "release-check",
                      "model": "model",
                      "components": []any{ledger.Object{
                          "usage_component": "input_uncached_tokens",
                          "unit": "token",
                          "price": ledger.Object{"amount": "1", "currency": "USD", "per": "1000000"},
                      }},
                      "source": ledger.Object{"name": "release-check"},
                  }},
                  nil,
              )
              if result["total"] != "0.001" {
                  encoded, _ := json.Marshal(result)
                  t.Fatalf("unexpected release-check total: %s", encoded)
              }
          }
          EOF
            go test ./...
          else
            echo "No published tag v${{ inputs.version }} found; skipping real Go tag verification for this no-publish rehearsal."
          fi

      - name: No-publish artifact review checklist
        if: ${{ !inputs.publish }}
        run: |
          {
            echo "## No-publish artifact review checklist"
            echo
            echo "- Confirm Python wheel and source distribution are present in workflow artifacts."
            echo "- Confirm npm tarball is present in workflow artifacts and includes package README."
            echo "- Confirm release readiness, dry-run, examples, package checks, and conformance tests passed."
            echo "- Confirm Go tag verification ran when tag v${{ inputs.version }} existed, or was explicitly skipped because the tag was absent."
            echo "- Keep publishing disabled until PyPI/npm trusted publishers are configured and artifacts are reviewed."
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Upload release artifacts
        uses: actions/upload-artifact@v4
        with:
          name: runcost-release-artifacts
          path: |
            dist/*.tar.gz
            dist/*.whl
            dist/npm/*.tgz

  publish:
    if: ${{ inputs.publish }}
    needs: verify
    runs-on: ubuntu-latest
    environment: release
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          registry-url: "https://registry.npmjs.org"

      - name: Build Python package
        run: |
          python3 -m pip install --upgrade build
          python3 -m build

      - name: Publish Python package
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: dist

      - name: Publish npm package
        working-directory: packages/javascript/core
        run: npm publish --provenance --access public
