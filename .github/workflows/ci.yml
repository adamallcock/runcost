name: ci

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Run conformance tests
        run: npm test

      - name: Run clean package install checks
        run: npm run check:packages

      - name: Run release readiness checks
        run: npm run check:release

      - name: Run examples
        run: |
          npm run example:js
          npm run example:py

      - name: Compile Python files
        run: |
          python3 -m py_compile \
            packages/python/runcost/core.py \
            packages/python/runcost/types.py \
            packages/python/runcost/__init__.py \
            scripts/check_fixtures.py \
            scripts/check_fixture_coverage.py \
            scripts/check_fixture_generator.py \
            scripts/check_project_hygiene.py \
            scripts/check_package_installs.py \
            scripts/check_release_readiness.py \
            scripts/check_schema_taxonomy.py \
            scripts/create_fixture.py \
            examples/python_basic.py
