name: ci

on:
  pull_request:
  push:
    branches:
      - main

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: false

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Run conformance tests
        run: npm test

      - name: Run framework alpha smoke samples
        run: |
          node scripts/run_vercel_alpha_smoke.mjs --mode sample --output /tmp/runcost-vercel-smoke.json --allow-sample-prices
          python3 scripts/run_langchain_alpha_smoke.py --mode sample --output /tmp/runcost-langchain-smoke.json --allow-sample-prices

      - name: Run clean package install checks
        run: npm run check:packages

      - name: Run release readiness checks
        run: npm run check:release

      - name: Run examples
        run: |
          npm run example:js
          npm run example:py

      - name: Compile Python files
        run: |
          python3 -m py_compile \
            packages/python/runcost/core.py \
            packages/python/runcost/types.py \
            packages/python/runcost/__init__.py \
            scripts/check_fixtures.py \
            scripts/check_fixture_coverage.py \
            scripts/check_fixture_generator.py \
            scripts/check_source_refresh.py \
            scripts/check_alpha_smoke.py \
            scripts/check_alpha_product_truth.py \
            scripts/check_invoice_comparison.py \
            scripts/check_project_completion_gates.py \
            scripts/check_generated_contract_docs.py \
            scripts/check_type_taxonomy_parity.py \
            scripts/check_project_hygiene.py \
            scripts/check_package_installs.py \
            scripts/check_release_readiness.py \
            scripts/compare_invoice_dashboard.py \
            scripts/generate_contract_docs.py \
            scripts/run_langchain_alpha_smoke.py \
            scripts/run_alpha_smoke.py \
            scripts/refresh_price_sources.py \
            scripts/check_schema_taxonomy.py \
            scripts/create_fixture.py \
            examples/python_basic.py
